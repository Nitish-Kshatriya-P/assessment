version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: imdb_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: imdb_api
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - DB_NAME=imdb_content
      - FLASK_ENV=development
      - PORT=5000

volumes:
  mongo_data: